<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>A股均线测算工具</title>
<!-- 样式表引入 -->
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<!-- ===== 顶部导航栏 ===== -->
<header class="header">
  <h1>A股均线测算工具</h1>
  <button class="theme-toggle" id="themeToggle" title="切换主题">&#9790;</button>
</header>

<!-- ===== 主容器 ===== -->
<div class="container">
  <!-- 输入区域 -->
  <div class="input-section">
    <div class="input-row">
      <div class="input-group" style="flex:2;">
        <label for="stockInput">股票代码/ETF代码（6位数字）</label>
        <div class="input-wrapper">
          <input type="text" id="stockInput" placeholder="例：600519 / 510300 / 159915" maxlength="6" inputmode="numeric" autocomplete="off">
          <div class="autocomplete-list" id="autocompleteList"></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" id="queryBtn">查询</button>
        <button class="btn btn-secondary" id="clearBtn">清空</button>
      </div>
    </div>
  </div>

  <!-- 状态栏（查询后显示） -->
  <div class="status-bar" id="statusBar" style="display:none;"></div>

  <!-- 结果区域 -->
  <div class="result-section" id="resultSection">
    <div class="result-header">
      <h2 id="resultTitle">均线测算结果</h2>
      <button class="copy-btn" id="copyBtn">复制表格数据</button>
    </div>
    <!-- 涨跌推演表容器 -->
    <div class="tables-wrapper" id="tablesWrapper"></div>
    <!-- 标注层切换条 -->
    <div class="sr-toggle-bar-inline" id="srToggleBar" style="display:none;">
      <span style="font-weight:600;color:var(--text-secondary);">标注层:</span>
      <div class="sr-toggle-item">
        <input type="checkbox" id="toggleSupRes" checked>
        <label for="toggleSupRes"><span class="sr-dot" style="background:#ef4444;"></span>支撑/压力</label>
      </div>
      <div class="sr-toggle-item">
        <input type="checkbox" id="toggleFib" checked>
        <label for="toggleFib"><span class="sr-dot" style="background:#f97316;"></span>斐波那契回撤</label>
      </div>
    </div>
    <!-- K线图容器 -->
    <div id="chartArea"></div>
  </div>

  <!-- 空状态提示 -->
  <div class="empty-state" id="emptyState">
    <div class="icon">&#128202;</div>
    <p>请输入6位股票代码或ETF代码，点击查询获取均线测算结果</p>
  </div>
</div>

<!-- ===== 加载遮罩 ===== -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <p id="loadingText">正在获取数据...</p>
  </div>
</div>

<!-- ===== 错误提示Toast ===== -->
<div class="error-toast" id="errorToast"></div>

<!-- ===== 主脚本（保持完整单文件，确保功能100%一致） ===== -->
<script>

(function() {
  'use strict';

  /* ===== State ===== */
  var historyCache = [];
  var lastResultText = '';
  var stockName = '';
  var closePrice = 0;
  var marketStatus = '';
  var historyPrices = [];
  var sourceName = '';
  var chartRawKlines = [];   // cached OHLC klines for chart
  var chartBasePrices = [];  // cached historical prices for MA calc
  var selectedPct = 0;       // currently selected % change
  var priceDigits = 2;       // 价格小数位数，ETF为3，普通股票为2
  var supportLevels = [];    // computed support/resistance levels
  var toggleSupport = true;  // toggle visibility of support/resistance lines
  var toggleFibonacci = true; // toggle fibonacci levels

  /* ===== DOM ===== */
  var stockInput = document.getElementById('stockInput');
  var queryBtn = document.getElementById('queryBtn');
  var clearBtn = document.getElementById('clearBtn');
  var themeToggle = document.getElementById('themeToggle');
  var statusBar = document.getElementById('statusBar');
  var resultSection = document.getElementById('resultSection');
  var tablesWrapper = document.getElementById('tablesWrapper');
  var chartArea = document.getElementById('chartArea');
  var resultTitle = document.getElementById('resultTitle');
  var copyBtn = document.getElementById('copyBtn');
  var emptyState = document.getElementById('emptyState');
  var loadingOverlay = document.getElementById('loadingOverlay');
  var loadingText = document.getElementById('loadingText');
  var errorToast = document.getElementById('errorToast');
  var autocompleteList = document.getElementById('autocompleteList');
  var srToggleBar = document.getElementById('srToggleBar');
  var toggleSupResEl = document.getElementById('toggleSupRes');
  var toggleFibEl = document.getElementById('toggleFib');

  /* ===== Theme ===== */
  function initTheme() {
    var saved = localStorage.getItem('ma-tool-theme');
    if (saved === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeToggle.innerHTML = '&#9788;';
    } else {
      document.documentElement.removeAttribute('data-theme');
      themeToggle.innerHTML = '&#9790;';
    }
  }
  initTheme();

  themeToggle.addEventListener('click', function() {
    var isDark = document.documentElement.hasAttribute('data-theme');
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      themeToggle.innerHTML = '&#9790;';
      localStorage.setItem('ma-tool-theme', 'light');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeToggle.innerHTML = '&#9788;';
      localStorage.setItem('ma-tool-theme', 'dark');
    }
  });

  /* ===== History ===== */
  function loadHistory() {
    try {
      var d = localStorage.getItem('ma-tool-history');
      historyCache = d ? JSON.parse(d) : [];
    } catch(e) { historyCache = []; }
  }
  loadHistory();

  function saveHistory(code, name) {
    historyCache = historyCache.filter(function(h) { return h.code !== code; });
    historyCache.unshift({ code: code, name: name, time: Date.now() });
    if (historyCache.length > 20) historyCache = historyCache.slice(0, 20);
    try { localStorage.setItem('ma-tool-history', JSON.stringify(historyCache)); } catch(e) {}
  }

  /* ===== Autocomplete ===== */
  function showAutocomplete(val) {
    if (!val) { autocompleteList.classList.remove('show'); return; }
    var matches = historyCache.filter(function(h) {
      return h.code.indexOf(val) !== -1 || val.indexOf(h.code) !== -1;
    });
    if (matches.length === 0) { autocompleteList.classList.remove('show'); return; }
    autocompleteList.innerHTML = matches.map(function(h, i) {
      return '<div class="autocomplete-item' + (i===0?' active':'') + '" data-code="' + h.code + '" data-name="' + (h.name||'') + '">'
        + '<span>' + h.code + '</span><span class="stock-name">' + (h.name||'') + '</span></div>';
    }).join('');
    autocompleteList.classList.add('show');
    var items = autocompleteList.querySelectorAll('.autocomplete-item');
    for (var i = 0; i < items.length; i++) {
      (function(el) {
        el.addEventListener('click', function() {
          stockInput.value = el.dataset.code;
          autocompleteList.classList.remove('show');
        });
      })(items[i]);
    }
  }

  stockInput.addEventListener('input', function() {
    showAutocomplete(stockInput.value.trim());
  });
  stockInput.addEventListener('focus', function() {
    if (stockInput.value.trim()) showAutocomplete(stockInput.value.trim());
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.input-wrapper')) autocompleteList.classList.remove('show');
  });

  stockInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); doQuery(); }
    if (e.key === 'Escape') autocompleteList.classList.remove('show');
  });

  stockInput.addEventListener('input', function() {
    stockInput.value = stockInput.value.replace(/[^\d]/g, '');
  });

  /* ===== Validation ===== */
  function validateCode(code) {
    code = code.replace(/\D/g, '');
    return code.length === 6 ? code : null;
  }

  /* ===== Market detection ===== */
  function getMarket(code) {
    var prefix = code.charAt(0);
    if (['6','9','5'].indexOf(prefix) !== -1) return 'sh';  // 沪市: 6xxxxx 9xxxxx 51xxxx(ETF)
    if (['0','3','4','8'].indexOf(prefix) !== -1) return 'sz';  // 深市: 0xxxxx 3xxxxx 4xxxxx 8xxxxx
    if (['1'].indexOf(prefix) !== -1) return 'sz';  // 深市ETF: 15xxxx
    return null;
  }

  /* ===== API: Tencent (Primary) ===== */
  // Single endpoint: web.ifzq.gtimg.cn returns both kline data AND quote info (UTF-8 JSON)
  // The qt sub-object contains name at index 1, price at index 3
  function fetchTencentData(code) {
    var market = getMarket(code);
    if (!market) return Promise.reject(new Error('不支持的股票代码前缀'));
    var ticker = market === 'sh' ? 'sh' + code : 'sz' + code;
    var url = 'https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=' + ticker + ',day,,,60,qfq';
    return fetch(url)
      .then(function(r) { if (!r.ok) throw new Error('腾讯接口 '+r.status); return r.json(); })
      .then(function(data) {
        var kd = data.data && data.data[ticker];
        if (!kd) throw new Error('腾讯接口无此股票数据');
        
        // qt is an OBJECT, not an array!
        // qt.ticker[1] = name, qt.ticker[3] = price
        var qt = kd.qt;
        if (!qt) throw new Error('腾讯接口quote数据不完整');
        var inner = qt[ticker];
        if (!inner || !Array.isArray(inner)) throw new Error('腾讯接口quote数据格式错误');
        var name = inner[1] || ('股票' + code);
        var price = parseFloat(inner[3]) || 0;
        if (!price) throw new Error('腾讯接口解析不到价格');
        
        // Extract K-line data
        var days = kd.qfqday || kd.day || [];
        if (!Array.isArray(days) || days.length === 0) throw new Error('腾讯kline无日线数据');
        
        // Format: [date, open, close, high, low, volume]
        var prices = [];
        var klines = [];
        for (var i = 0; i < days.length; i++) {
          if (!days[i] || !Array.isArray(days[i]) || days[i].length < 3) continue;
          if (typeof days[i][2] === 'object') continue;
          var p = parseFloat(days[i][2]);
          if (!isNaN(p)) prices.push(p);
          // Build OHLC for chart
          klines.push({
            date: days[i][0],
            open: parseFloat(days[i][1]) || p,
            close: p,
            high: parseFloat(days[i][3]) || p,
            low: parseFloat(days[i][4]) || p
          });
        }
        if (prices.length === 0) throw new Error('腾讯kline解析不到收盘价');
        
        return { name: name, price: price, prices: prices, klines: klines };
      });
  }

  /* ===== Fetch with retry ===== */
  // Only use Tencent API — single request returns name + price + klines (all UTF-8 JSON)
  function fetchAllData(code) {
    return new Promise(function(resolve, reject) {
      var timer = setTimeout(function() {
        reject(new Error('数据请求超时，请检查网络连接'));
      }, 8000);

      fetchTencentData(code)
        .then(function(result) {
          clearTimeout(timer);
          if (result && result.prices && result.prices.length > 0) {
            resolve({ 
              prices: result.prices, 
              klines: result.klines,
              name: result.name, 
              source: '腾讯', 
              quotePrice: result.price 
            });
          } else {
            reject(new Error('未获取到有效数据，请检查股票代码是否正确'));
          }
        })
        .catch(function(err) {
          clearTimeout(timer);
          reject(new Error('数据获取失败: ' + (err.message || '未知错误')));
        });
    });
  }

  /* ===== K-Line Chart ===== */
  var _chartData = null; // cached for redraw on resize/theme change

  function drawKLineChart(container, klines, ma5Arr, ma10Arr, ma20Arr, name, code, projectedPrice, highlightIdx) {
    container.innerHTML = '';
    _chartData = { klines: klines, ma5Arr: ma5Arr, ma10Arr: ma10Arr, ma20Arr: ma20Arr, name: name, code: code };

    // Title (clickable to toggle)
    var card = document.createElement('div');
    card.className = 'chart-card';
    var title = document.createElement('div');
    title.className = 'table-card-title';
    var subtitle = projectedPrice ? ' (预测收盘: ' + projectedPrice.toFixed(priceDigits) + ')' : '';
    title.innerHTML = name + '(' + code + ') K线图与均线<span style="font-size:12px;color:var(--text-secondary);margin-left:8px;">' + subtitle + '</span> <span class="toggle-icon">&#9650;</span>';
    var canvasWrap = document.createElement('div');
    canvasWrap.className = 'chart-canvas-wrap';
    var canvas = document.createElement('canvas');
    canvas.id = 'klineCanvas';
    canvasWrap.appendChild(canvas);
    card.appendChild(title);
    card.appendChild(canvasWrap);
    container.appendChild(card);

    // Default: expanded
    canvasWrap.classList.add('show');
    title.querySelector('.toggle-icon').innerHTML = '&#9660;';
    // Wait for layout to settle before rendering canvas
    setTimeout(function() { requestAnimationFrame(renderChart); }, 100);

    // Toggle handler
    title.addEventListener('click', function() {
      canvasWrap.classList.toggle('show');
      var icon = title.querySelector('.toggle-icon');
      icon.innerHTML = canvasWrap.classList.contains('show') ? '&#9650;' : '&#9660;';
      if (canvasWrap.classList.contains('show')) {
        requestAnimationFrame(renderChart);
      }
    });

    function renderChart() {
      var rect = canvas.parentElement.getBoundingClientRect();
      var dpr = window.devicePixelRatio || 1;
      var W = rect.width - 24; // minus padding
      var H = parseInt(getComputedStyle(canvas).height, 10) || 360;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      // Colors
      var isDark = document.documentElement.hasAttribute('data-theme');
      var bg = isDark ? '#1e293b' : '#ffffff';
      var gridColor = isDark ? '#334155' : '#f0f0f0';
      var textColor = isDark ? '#94a3b8' : '#6b7280';
      var winColor = '#dc2626';   // red (up)
      var lossColor = '#16a34a';  // green (down)
      var ma5Color = '#f59e0b';   // amber
      var ma10Color = '#8b5cf6';  // purple
      var ma20Color = '#06b6d4';  // cyan
      var futureColor = '#ff6b00'; // orange for projected

      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      var padL = 55, padR = 10, padT = 15, padB = 30;
      var chartW = W - padL - padR;
      var chartH = H - padT - padB;

      // Total points: real klines + 1 future
      var totalPts = klines.length + 1;

      // Collect all prices (kline close + highs + lows + MA lines + projected values)
      var allVals = [];
      for (var i = 0; i < klines.length; i++) {
        var k = klines[i];
        if (k.high) allVals.push(k.high);
        if (k.low) allVals.push(k.low);
        if (k.close) allVals.push(k.close);
      }
      if (ma5Arr) for (var i = 0; i < ma5Arr.length; i++) { if (ma5Arr[i] != null) allVals.push(ma5Arr[i]); }
      if (ma10Arr) for (var i = 0; i < ma10Arr.length; i++) { if (ma10Arr[i] != null) allVals.push(ma10Arr[i]); }
      if (ma20Arr) for (var i = 0; i < ma20Arr.length; i++) { if (ma20Arr[i] != null) allVals.push(ma20Arr[i]); }

      // Add projected price and projected MAs to scale
      if (projectedPrice != null && projectedPrice > 0) {
        allVals.push(projectedPrice);
        // Compute projected MAs for future day
        var histLen = historyPrices.length;
        var futureMA5 = calcProjectedMA(historyPrices, projectedPrice, 5);
        var futureMA10 = calcProjectedMA(historyPrices, projectedPrice, 10);
        var futureMA20 = calcProjectedMA(historyPrices, projectedPrice, 20);
        if (futureMA5 != null) allVals.push(futureMA5);
        if (futureMA10 != null) allVals.push(futureMA10);
        if (futureMA20 != null) allVals.push(futureMA20);
      }

      if (allVals.length === 0) return;

      var minV = Math.min.apply(null, allVals);
      var maxV = Math.max.apply(null, allVals);
      var range = maxV - minV || 1;
      var margin = range * 0.08;
      minV -= margin;
      maxV += margin;
      range = maxV - minV;

      function xPos(i) { return padL + (i + 0.5) / totalPts * chartW; }
      function yPos(v) { return padT + (1 - (v - minV) / range) * chartH; }

      // Grid lines
      ctx.strokeStyle = gridColor;
      ctx.lineWidth = 0.5;
      var gridLines = 5;
      for (var g = 0; g <= gridLines; g++) {
        var y = padT + g / gridLines * chartH;
        ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
        var val = maxV - g / gridLines * range;
        ctx.fillStyle = textColor;
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(val.toFixed(priceDigits), padL - 5, y + 3);
      }

      // MA legend
      ctx.font = '11px sans-serif';
      var lx = padL + 5;
      var ly = padT + 12;
      if (ma5Arr) { ctx.fillStyle = ma5Color; ctx.fillText('MA5', lx, ly); lx += ctx.measureText('MA5').width + 12; }
      if (ma10Arr) { ctx.fillStyle = ma10Color; ctx.fillText('MA10', lx, ly); lx += ctx.measureText('MA10').width + 12; }
      if (ma20Arr) { ctx.fillStyle = ma20Color; ctx.fillText('MA20', lx, ly); }
      if (projectedPrice != null) { ctx.fillStyle = futureColor; ctx.fillText('预测', lx, ly); }

      // ===== Draw Support/Resistance Levels =====
      if (supportLevels && supportLevels.length > 0) {
        var rightLabelX = W - padR + 2; // slightly past chart area on the right
        var labelOffsetY = 0;
        for (var sl = 0; sl < supportLevels.length; sl++) {
          var level = supportLevels[sl];
          var show = false;
          var lineColor = '';
          var dashPattern = [6, 4];

          if (level.type === 'resistance' && toggleSupport) { show = true; lineColor = '#ef4444'; }
          else if (level.type === 'support' && toggleSupport) { show = true; lineColor = '#22c55e'; }
          else if (level.type === 'fibonacci' && toggleFibonacci) { show = true; lineColor = '#f97316'; }

          if (!show) continue;

          if (level.price < minV || level.price > maxV) continue;

          var yLevel = yPos(level.price);
          if (yLevel < padT - 5 || yLevel > padT + chartH + 5) continue;

          ctx.save();
          ctx.setLineDash(dashPattern);
          ctx.strokeStyle = lineColor;
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(padL, yLevel);
          ctx.lineTo(W - padR, yLevel);
          ctx.stroke();
          ctx.restore();

          // Label on the right
          ctx.save();
          ctx.setLineDash([]);
          ctx.fillStyle = lineColor;
          ctx.font = 'bold 10px sans-serif';
          ctx.textAlign = 'right';
          var labelText = level.label + ' ' + level.price.toFixed(priceDigits);
          ctx.fillText(labelText, W - padR - 2, yLevel - 4);
          ctx.restore();
        }
      }

      // Draw MA lines (extend to future day)
      function drawLine(arr, color, extendToFuture, futureVal) {
        if (!arr) return;
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.beginPath();
        var started = false;
        for (var i = 0; i < arr.length; i++) {
          if (arr[i] == null) continue;
          var x = xPos(i), y = yPos(arr[i]);
          if (!started) { ctx.moveTo(x, y); started = true; }
          else ctx.lineTo(x, y);
        }
        // Extend to future day
        if (extendToFuture && futureVal != null) {
          var fx = xPos(arr.length), fy = yPos(futureVal);
          ctx.lineTo(fx, fy);
        }
        ctx.stroke();
      }
      drawLine(ma20Arr, ma20Color, !!projectedPrice,
        projectedPrice != null ? calcProjectedMA(historyPrices, projectedPrice, 20) : null);
      drawLine(ma10Arr, ma10Color, !!projectedPrice,
        projectedPrice != null ? calcProjectedMA(historyPrices, projectedPrice, 10) : null);
      drawLine(ma5Arr, ma5Color, !!projectedPrice,
        projectedPrice != null ? calcProjectedMA(historyPrices, projectedPrice, 5) : null);

      // Draw vertical separator line between real and future
      var futureX = xPos(klines.length);
      ctx.setLineDash([3, 3]);
      ctx.strokeStyle = isDark ? '#475569' : '#cbd5e1';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(futureX, padT);
      ctx.lineTo(futureX, padT + chartH);
      ctx.stroke();
      ctx.setLineDash([]);

      // Label "未来"
      ctx.fillStyle = textColor;
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('未来', futureX, padT - 3);

      // Draw candlesticks (real only)
      var barW = Math.max(2, Math.min(12, chartW / totalPts * 0.6));
      for (var i = 0; i < klines.length; i++) {
        var k = klines[i];
        var open = k.open, close = k.close, high = k.high, low = k.low;
        var isWin = close >= open;
        var color = isWin ? winColor : lossColor;

        // Wick
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(xPos(i), yPos(high));
        ctx.lineTo(xPos(i), yPos(low));
        ctx.stroke();

        // Body
        var yOpen = yPos(open), yClose = yPos(close);
        var bodyTop = Math.min(yOpen, yClose);
        var bodyH = Math.max(Math.abs(yOpen - yClose), 1);
        ctx.fillStyle = color;
        ctx.fillRect(xPos(i) - barW / 2, bodyTop, barW, bodyH);
      }

      // Draw projected future candlestick (ghost/dashed)
      if (projectedPrice != null && projectedPrice > 0) {
        var lastK = klines[klines.length - 1];
        var prevClose = lastK ? lastK.close : projectedPrice;
        var isUp = projectedPrice >= prevClose;
        var fBarW = barW * 1.2;
        var fx = xPos(klines.length);
        var yPrev = yPos(prevClose);
        var yProj = yPos(projectedPrice);
        var yBodyTop = Math.min(yPrev, yProj);
        var yBodyBot = Math.max(yPrev, yProj);
        var bodyH = Math.max(yBodyBot - yBodyTop, 1);

        // Dashed body
        ctx.save();
        ctx.setLineDash([3, 2]);
        ctx.strokeStyle = isUp ? winColor : lossColor;
        ctx.lineWidth = 1.5;
        ctx.fillStyle = isUp ? winColor : lossColor;
        ctx.globalAlpha = 0.5;
        // Wick
        ctx.beginPath();
        ctx.moveTo(fx, yPos(projectedPrice));
        ctx.lineTo(fx, yBodyTop + bodyH + 5); // extend a bit
        ctx.stroke();
        // Body
        ctx.fillRect(fx - fBarW / 2, yBodyTop, fBarW, bodyH);
        ctx.restore();

        // Projected MA labels on the right side
        var futureMA5 = calcProjectedMA(historyPrices, projectedPrice, 5);
        var futureMA10 = calcProjectedMA(historyPrices, projectedPrice, 10);
        var futureMA20 = calcProjectedMA(historyPrices, projectedPrice, 20);

        var labelX = fx + fBarW / 2 + 4;
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'left';
        var ly2 = yBodyTop + 2;
        if (futureMA5 != null) {
          ctx.fillStyle = ma5Color;
          ctx.fillText('MA5:' + futureMA5.toFixed(priceDigits), labelX, ly2);
          ly2 += 12;
        }
        if (futureMA10 != null) {
          ctx.fillStyle = ma10Color;
          ctx.fillText('MA10:' + futureMA10.toFixed(priceDigits), labelX, ly2);
          ly2 += 12;
        }
        if (futureMA20 != null) {
          ctx.fillStyle = ma20Color;
          ctx.fillText('MA20:' + futureMA20.toFixed(priceDigits), labelX, ly2);
        }
      }

      // Date labels (real klines only)
      ctx.fillStyle = textColor;
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'center';
      var step = Math.max(1, Math.floor(klines.length / 8));
      for (var i = 0; i < klines.length; i += step) {
        var label = klines[i].date || '';
        if (label && label.length > 5) label = label.substr(5); // show MM-DD
        ctx.fillText(label, xPos(i), H - 5);
      }
    }

    // Auto-expand on first render if chart area is visible
    // Don't auto-expand; user clicks to toggle
  }

  /* ===== MA Calculation ===== */
  function calcMA(prices, period) {
    if (!prices || prices.length < period) return null;
    var slice = prices.slice(-period);
    var sum = 0;
    for (var i = 0; i < slice.length; i++) sum += slice[i];
    return sum / period;
  }

  function calcProjectedMA(histPrices, projectedPrice, period) {
    if (!histPrices || histPrices.length < period - 1) return null;
    var window = [];
    var start = histPrices.length - (period - 1);
    for (var i = start; i < histPrices.length; i++) window.push(histPrices[i]);
    window.push(projectedPrice);
    var sum = 0;
    for (var i = 0; i < window.length; i++) sum += window[i];
    return sum / period;
  }

  /* ===== Market Status ===== */
  function detectMarketStatus() {
    var now = new Date();
    var day = now.getDay();
    if (day === 0 || day === 6) return 'closed';
    var h = now.getHours();
    var m = now.getMinutes();
    var timeMin = h * 60 + m;
    // Trading: 9:30-11:30 (570-690), 13:00-15:00 (780-900)
    // Pre-open: 9:15-9:25 (555-565)
    if ((timeMin >= 570 && timeMin < 690) || (timeMin >= 780 && timeMin < 900) || (timeMin >= 555 && timeMin < 570)) {
      return 'intraday';
    }
    return 'closed';
  }

  /* ===== Support/Resistance Toggles ===== */
  toggleSupResEl.addEventListener('change', function() { toggleSupport = this.checked; redrawChartWithLevel(); });
  toggleFibEl.addEventListener('change', function() { toggleFibonacci = this.checked; redrawChartWithLevel(); });

  /* ===== Support/Resistance Level Calculation ===== */
  function computeSupportResistance(klines, prices) {
    var levels = [];
    var n = prices.length;
    var lookbackShort = Math.min(20, n);
    var lookbackMid = Math.min(60, n);

    // Short-term resistance/support (recent N highs/lows)
    var shortHigh = -Infinity, shortLow = Infinity;
    for (var i = n - lookbackShort; i < n; i++) {
      if (klines[i] && klines[i].high) shortHigh = Math.max(shortHigh, klines[i].high);
      if (klines[i] && klines[i].low) shortLow = Math.min(shortLow, klines[i].low);
    }
    if (shortHigh !== -Infinity) levels.push({ price: shortHigh, type: 'resistance', label: '短期压力' });
    if (shortLow !== Infinity) levels.push({ price: shortLow, type: 'support', label: '短期支撑' });

    // Mid-term resistance/support
    var midHigh = -Infinity, midLow = Infinity;
    for (var i = n - lookbackMid; i < n; i++) {
      if (klines[i] && klines[i].high) midHigh = Math.max(midHigh, klines[i].high);
      if (klines[i] && klines[i].low) midLow = Math.min(midLow, klines[i].low);
    }
    if (midHigh !== -Infinity) levels.push({ price: midHigh, type: 'resistance', label: '中期压力' });
    if (midLow !== Infinity) levels.push({ price: midLow, type: 'support', label: '中期支撑' });

    // Fibonacci retracement levels (based on recent 60 or all)
    var fibRange = Math.min(60, n);
    var fibHigh = -Infinity, fibLow = Infinity;
    for (var i = n - fibRange; i < n; i++) {
      if (klines[i]) {
        fibHigh = Math.max(fibHigh, klines[i].high);
        fibLow = Math.min(fibLow, klines[i].low);
      }
    }
    if (fibHigh !== -Infinity && fibLow !== Infinity && fibHigh > fibLow) {
      var diff = fibHigh - fibLow;
      var fibRatios = [0.382, 0.5, 0.618];
      for (var f = 0; f < fibRatios.length; f++) {
        var fb = fibHigh - diff * fibRatios[f];
        if (fb > fibLow && fb < fibHigh) {
          levels.push({ price: fb, type: 'fibonacci', label: '斐波那契' });
        }
      }
    }

    // Deduplicate: merge levels very close together (within 0.3%)
    var unique = [];
    for (var j = 0; j < levels.length; j++) {
      var found = false;
      for (var k = 0; k < unique.length; k++) {
        if (Math.abs(levels[j].price - unique[k].price) / levels[j].price < 0.003) {
          found = true; break;
        }
      }
      if (!found) unique.push(levels[j]);
    }

    supportLevels = unique.sort(function(a, b) { return b.price - a.price; });
    return supportLevels;
  }

  /* ===== Redraw chart with current level visibility ===== */
  function redrawChartWithLevel() {
    if (!_chartData) return;
    var projectedPrice = selectedPct !== null ? chartBasePrices[chartBasePrices.length - 1] * (1 + selectedPct / 100) : null;
    drawKLineChart(chartArea, chartRawKlines, _chartData.ma5Arr, _chartData.ma10Arr, _chartData.ma20Arr,
      _chartData.name, _chartData.code, projectedPrice, selectedPct);
  }

  /* ===== Build Change Table (with key-level column) ===== */
  function buildChangeTable(title, prices, basePrice, changes) {
    chartBasePrices = prices; // cache for chart redraw
    var html = '<div class="table-card">';
    html += '<div class="table-card-title">' + title + '</div>';
    html += '<div class="dual-tables">';

    var posChanges = changes.filter(function(c) { return c >= 0; });
    var negChanges = changes.filter(function(c) { return c < 0; });

    html += '<div class="dual-col">';
    html += buildChangeTableColumn(posChanges, prices, basePrice, true);
    html += '</div>';
    html += '<div class="dual-col">';
    html += buildChangeTableColumn(negChanges, prices, basePrice, false);
    html += '</div>';
    html += '</div></div></div>';
    return html;
  }

  function buildChangeTableColumn(changes, prices, basePrice, isPositive) {
    var html = '<table class="data-table data-table-half"><thead><tr>';
    html += '<th>涨跌幅</th><th>预测收盘价</th><th>关键位</th><th>MA5</th><th>MA10</th><th>MA20</th>';
    html += '</tr></thead><tbody>';

    for (var i = 0; i < changes.length; i++) {
      var pct = changes[i];
      var projectedPrice = basePrice * (1 + pct / 100);
      var ma5 = calcProjectedMA(prices, projectedPrice, 5);
      var ma10 = calcProjectedMA(prices, projectedPrice, 10);
      var ma20 = calcProjectedMA(prices, projectedPrice, 20);

      // Find nearest key level
      var keyLevelInfo = findNearestKeyLevel(projectedPrice);

      var sign = pct >= 0 ? '+' : '';
      var cls = pct === 0 ? 'price-base' : (pct > 0 ? 'price-win' : 'price-loss');
      var rowCls = pct === selectedPct ? ' selected-row' : '';

      html += '<tr class="change-row' + rowCls + '" data-pct="' + pct + '">';
      html += '<td class="' + cls + '"><strong>' + sign + pct + '%</strong></td>';
      html += '<td class="' + cls + '">' + projectedPrice.toFixed(priceDigits) + '</td>';
      html += '<td class="' + (keyLevelInfo.highlight ? 'key-highlight' : '') + '">' + keyLevelInfo.text + '</td>';
      html += '<td>' + (ma5 !== null ? ma5.toFixed(priceDigits) : '-') + '</td>';
      html += '<td>' + (ma10 !== null ? ma10.toFixed(priceDigits) : '-') + '</td>';
      html += '<td>' + (ma20 !== null ? ma20.toFixed(priceDigits) : '-') + '</td>';
      html += '</tr>';
    }

    html += '</tbody></table>';
    return html;
  }

  function findNearestKeyLevel(projectedPrice) {
    if (!supportLevels || supportLevels.length === 0) {
      return { text: '-', highlight: false };
    }
    var nearest = null;
    var nearestDist = Infinity;
    for (var i = 0; i < supportLevels.length; i++) {
      var dist = Math.abs(supportLevels[i].price - projectedPrice);
      if (dist < nearestDist) {
        nearestDist = dist;
        nearest = supportLevels[i];
      }
    }
    if (!nearest) return { text: '-', highlight: false };
    var pctDiff = nearestDist / nearest.price;
    var isHighlight = pctDiff < 0.005; // within 0.5%
    return {
      text: nearest.label + ' ' + nearest.price.toFixed(priceDigits),
      highlight: isHighlight
    };
  }

  /* ===== Generate Copy Text ===== */
  function generateCopyText(name, code, close, status, changes, prices, baseMAs) {
    var text = name + '(' + code + ') 均线测算\n';
    text += '最新价: ' + close.toFixed(priceDigits) + ' | 状态: ' + (status === 'intraday' ? '盘中' : '已收盘') + '\n';
    text += '数据源: ' + sourceName + '\n';
    text += '========================================\n\n';

    var m5s = baseMAs.ma5 ? baseMAs.ma5.toFixed(priceDigits) : 'N/A';
    var m10s = baseMAs.ma10 ? baseMAs.ma10.toFixed(priceDigits) : 'N/A';
    var m20s = baseMAs.ma20 ? baseMAs.ma20.toFixed(priceDigits) : 'N/A';
    text += '当前MA5: ' + m5s + '  MA10: ' + m10s + '  MA20: ' + m20s + '\n\n';
    text += '涨跌幅\t预测价\tMA5\tMA10\tMA20\n';
    text += '----------------------------------------\n';

    for (var i = 0; i < changes.length; i++) {
      var pct = changes[i];
      var sign = pct >= 0 ? '+' : '';
      var projP = close * (1 + pct / 100);
      var ma5v = calcProjectedMA(prices, projP, 5);
      var ma10v = calcProjectedMA(prices, projP, 10);
      var ma20v = calcProjectedMA(prices, projP, 20);
      text += sign + pct + '%\t' + projP.toFixed(priceDigits) + '\t'
        + (ma5v ? ma5v.toFixed(priceDigits) : '-') + '\t'
        + (ma10v ? ma10v.toFixed(priceDigits) : '-') + '\t'
        + (ma20v ? ma20v.toFixed(priceDigits) : '-') + '\n';
    }

    return text;
  }

  /* ===== Main Query ===== */
  function doQuery() {
    var rawCode = stockInput.value.trim();
    var code = validateCode(rawCode);
    if (!code) {
      showError('请输入有效的6位股票代码');
      stockInput.focus();
      return;
    }

    hideError();
    loadingOverlay.classList.add('show');
    loadingText.textContent = '正在获取数据...';
    resultSection.classList.remove('show');
    statusBar.style.display = 'none';
    emptyState.style.display = 'none';

    var changes = [];
    for (var p = -10; p <= 10; p++) changes.push(p);

    fetchAllData(code)
      .then(function(data) {
        console.log('[DOQUERY] Success:', data.name, data.source);
        var prices = data.prices;
        var klines = data.klines || [];
        var name = data.name || ('股票' + code);
        var src = data.source || '未知';

        // Save history
        saveHistory(code, name);

        // Detect status
        marketStatus = detectMarketStatus();
        closePrice = prices[prices.length - 1];
        // Use up to 60 trading days of data
        historyPrices = prices.slice(-60);
        sourceName = src;

        // Slice klines to match historyPrices length
        var alignedKlines = klines.slice(-historyPrices.length);
        chartRawKlines = alignedKlines;  // cache for chart redraw on toggle

        // ETF (51xx / 15xx) prices are 3 decimal places
        priceDigits = (code.charAt(0) === '5' || code.charAt(0) === '1') ? 3 : 2;

        // Current MAs
        var baseMAs = {
          ma5: calcMA(historyPrices, 5),
          ma10: calcMA(historyPrices, 10),
          ma20: calcMA(historyPrices, 20)
        };

        // Compute support/resistance levels
        computeSupportResistance(alignedKlines, historyPrices);

        // MA arrays for chart (full history + projected)
        var ma5Arr = [], ma10Arr = [], ma20Arr = [];
        for (var i = 0; i < historyPrices.length; i++) {
          ma5Arr.push(calcMA(historyPrices.slice(0, i + 1), 5));
          ma10Arr.push(calcMA(historyPrices.slice(0, i + 1), 10));
          ma20Arr.push(calcMA(historyPrices.slice(0, i + 1), 20));
        }

        // Status bar with inline MA values
        var tagCls = marketStatus === 'intraday' ? 'tag-intraday' : 'tag-closed';
        var tagTxt = marketStatus === 'intraday' ? '盘中' : '已收盘';
        var maHtml = '<span class="ma-inline">';
        if (baseMAs.ma5 != null) {
          var ma5cls = closePrice > baseMAs.ma5 ? 'ma-above' : 'ma-below';
          maHtml += '<span>MA5: <span class="ma-val ' + ma5cls + '">' + baseMAs.ma5.toFixed(priceDigits) + '</span></span>';
        }
        if (baseMAs.ma10 != null) {
          var ma10cls = closePrice > baseMAs.ma10 ? 'ma-above' : 'ma-below';
          maHtml += '<span>MA10: <span class="ma-val ' + ma10cls + '">' + baseMAs.ma10.toFixed(priceDigits) + '</span></span>';
        }
        if (baseMAs.ma20 != null) {
          var ma20cls = closePrice > baseMAs.ma20 ? 'ma-above' : 'ma-below';
          maHtml += '<span>MA20: <span class="ma-val ' + ma20cls + '">' + baseMAs.ma20.toFixed(priceDigits) + '</span></span>';
        }
        maHtml += '</span>';

        statusBar.innerHTML = '<span class="stock-name-display">' + name + ' (' + code + ')</span>'
          + '<span class="price-display">最新价: <strong style="color:var(--win)">' + closePrice.toFixed(priceDigits) + '</strong></span>'
          + maHtml
          + '<span class="status-tag ' + tagCls + '">' + tagTxt + '</span>'
          + '<span class="price-display" style="font-size:11px;color:var(--text-secondary)">数据源: ' + src + '</span>';
        statusBar.style.display = 'flex';

        // Show SR toggle bar
        srToggleBar.style.display = 'flex';

        // Build tables
        var html = '';

        if (marketStatus === 'intraday') {
          // 盘中: 用昨收价作为基准推演
          var yesterdayClose = prices.length >= 2 ? prices[prices.length - 2] : closePrice;
          html += buildChangeTable(name + '(' + code + ') - 盘中推演（以昨日收盘' + yesterdayClose.toFixed(priceDigits) + '为基准）',
            historyPrices, yesterdayClose, changes);
        } else {
          // 已收盘: 用今日真实收盘价推演明日
          html += buildChangeTable(name + '(' + code + ') - 明日推演（以今日收盘' + closePrice.toFixed(priceDigits) + '为基准）',
            historyPrices, closePrice, changes);
        }

        tablesWrapper.innerHTML = html;
        resultTitle.textContent = name + '(' + code + ') 均线测算';
        resultSection.classList.add('show');

        // Bind click events on change rows
        var rows = tablesWrapper.querySelectorAll('.change-row');
        for (var r = 0; r < rows.length; r++) {
          (function(row) {
            row.addEventListener('click', function() {
              var pct = parseInt(this.dataset.pct, 10);
              selectAndRedraw(pct, name, code);
            });
          })(rows[r]);
        }

        // Draw K-line chart
        drawKLineChart(chartArea, alignedKlines, ma5Arr, ma10Arr, ma20Arr, name, code);

        lastResultText = generateCopyText(name, code, closePrice, marketStatus, changes, historyPrices, baseMAs);
      })
      .catch(function(err) {
        showError(err.message || '查询失败，请检查股票代码后重试');
        emptyState.style.display = 'block';
      })
      .finally(function() {
        loadingOverlay.classList.remove('show');
      });
  }

  /* ===== Select change % and redraw chart ===== */
  function selectAndRedraw(pct, name, code) {
    selectedPct = pct;

    // Re-render tables with new selection highlight
    var basePrice = historyPrices[historyPrices.length - 1];
    var projectedPrice = basePrice * (1 + pct / 100);
    var ma5 = calcProjectedMA(historyPrices, projectedPrice, 5);
    var ma10 = calcProjectedMA(historyPrices, projectedPrice, 10);
    var ma20 = calcProjectedMA(historyPrices, projectedPrice, 20);

    // Update table row highlights
    var rows = tablesWrapper.querySelectorAll('.change-row');
    for (var i = 0; i < rows.length; i++) {
      if (parseInt(rows[i].dataset.pct, 10) === pct) {
        rows[i].classList.add('selected-row');
      } else {
        rows[i].classList.remove('selected-row');
      }
    }

    // Redraw chart with projected price
    var ma5Arr = [], ma10Arr = [], ma20Arr = [];
    for (var i = 0; i < historyPrices.length; i++) {
      ma5Arr.push(calcMA(historyPrices.slice(0, i + 1), 5));
      ma10Arr.push(calcMA(historyPrices.slice(0, i + 1), 10));
      ma20Arr.push(calcMA(historyPrices.slice(0, i + 1), 20));
    }
    drawKLineChart(chartArea, chartRawKlines, ma5Arr, ma10Arr, ma20Arr, name, code, projectedPrice, pct);
  }

  /* ===== Buttons ===== */
  // Expose for browser automation testing
  window._doQueryInline = doQuery;
  queryBtn.addEventListener('click', doQuery);
  clearBtn.addEventListener('click', function() {
    stockInput.value = '';
    resultSection.classList.remove('show');
    statusBar.style.display = 'none';
    emptyState.style.display = 'block';
    hideError();
    stockInput.focus();
  });

  /* ===== Copy ===== */
  copyBtn.addEventListener('click', function() {
    if (!lastResultText) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(lastResultText).then(function() {
        copyBtn.textContent = '已复制!';
        copyBtn.style.background = 'var(--green)';
        setTimeout(function() { copyBtn.textContent = '复制表格数据'; copyBtn.style.background = ''; }, 1500);
      }).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }
  });

  function fallbackCopy() {
    var ta = document.createElement('textarea');
    ta.value = lastResultText;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    copyBtn.textContent = '已复制!';
    setTimeout(function() { copyBtn.textContent = '复制表格数据'; }, 1500);
  }

  /* ===== Error ===== */
  function showError(msg) {
    errorToast.textContent = msg;
    errorToast.classList.add('show');
    setTimeout(hideError, 5000);
  }
  function hideError() {
    errorToast.classList.remove('show');
  }

})();

</script>
